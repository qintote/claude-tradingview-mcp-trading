# Railway configuration for the Python XAUUSD scheduler service.
# This file tells Railway how to build and run the Python scheduler.
# The Node.js telegram-bot.js service uses railway.json (separate deploy config).

[build]
builder = "NIXPACKS"

[deploy]
startCommand = "python run_scheduler.py"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

[deploy.healthcheck]
# Railway will restart the container if it stops responding.
# Our service is a long-running process with no HTTP port, so we rely on
# process-level health only (Railway detects non-zero exit codes).
timeout = 30
